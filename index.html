<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>正金匠 · 珠宝图册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#FAFAFA;color:#1A1A1A;-webkit-tap-highlight-color:transparent}
.header{position:sticky;top:0;z-index:10;background:#fff;padding:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px}
.header .logo{font-size:18px;font-weight:700;color:#1A1A1A;white-space:nowrap;display:flex;align-items:center;gap:8px}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:#5B9BD5;color:#fff;font-size:16px;font-weight:700;border-radius:7px;font-family:serif;line-height:1}
.logo-img{height:32px;width:auto;vertical-align:middle}
.logo-text-fallback{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700;color:#1A1A1A;white-space:nowrap}
.header .search{flex:1;max-width:220px;border:1px solid #E5E5EA;border-radius:10px;padding:8px 14px;font-size:14px;outline:none;background:#FAFAFA;transition:border-color .2s}
.header .search:focus{border-color:#5B9BD5}
.filters{background:#fff;padding:8px 16px;display:flex;gap:6px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;border-bottom:1px solid #f0f0f0;align-items:center}
.filters::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #E5E5EA;background:#fff;color:#1A1A1A;transition:all .2s;flex-shrink:0;white-space:nowrap}
.chip.on{background:#5B9BD5;color:#fff;border-color:#5B9BD5}
.chip.parent{font-weight:600;font-size:13px}
.chip.sub{color:#8E8E93;font-size:11px;padding-left:8px}
.sub-group{display:inline-flex;gap:4px}
.grid{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(.98)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#F0F4F8}
.card .noimg{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#E8F4FD,#F0F4F8)}
.card .info{padding:8px 10px 10px}
.card .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta{font-size:11px;color:#8E8E93;margin-top:3px}
.card .price{font-size:15px;font-weight:700;color:#5B9BD5;margin-top:4px}
.detail{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:100;overflow-y:auto;animation:fadeIn .25s}
.detail.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.detail .back{position:fixed;top:14px;left:14px;z-index:101;background:rgba(0,0,0,.35);color:#fff;border:none;padding:8px 14px 8px 10px;border-radius:20px;font-size:14px;cursor:pointer;backdrop-filter:blur(10px);display:flex;align-items:center;gap:4px}
.detail img{width:100%;max-height:50vh;object-fit:contain;background:linear-gradient(180deg,#F0F4F8,#FAFAFA);cursor:zoom-in;transition:max-height .3s}
.detail img.zoomed{max-height:none;cursor:zoom-out;position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:contain;background:rgba(0,0,0,.9);z-index:200}
.detail .body{padding:20px}
.detail h2{font-size:20px;font-weight:700;margin-bottom:12px}
.detail .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.detail .tag{background:#E8F4FD;color:#3A7BBF;padding:5px 10px;border-radius:6px;font-size:12px}
.detail .specs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.detail .spec{background:#FAFAFA;padding:8px 12px;border-radius:8px;font-size:13px;color:#1A1A1A}
.detail .cost{font-size:28px;font-weight:700;color:#5B9BD5}
.empty{text-align:center;padding:60px 20px;color:#8E8E93}
.empty .icon{font-size:48px;margin-bottom:12px}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
</style></head>
<body>
<div class="header"><span class="logo"><img class="logo-img" src="logo.png" alt="正金匠" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="logo-text-fallback" style="display:none"><span class="logo-mark">金</span>正金匠</span></span><input class="search" type="text" placeholder="搜索产品..." oninput="search()" id="searchInput"></div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<div class="detail" id="detail">
  <button class="back" onclick="closeDetail()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>返回</button>
  <img id="detailImg" src="">
  <div class="body">
    <h2 id="detailName"></h2>
    <div class="tags" id="detailTags"></div>
    <div class="specs" id="detailSpecs"></div>
    <div class="cost" id="detailCost"></div>
  </div>
</div>

var activeCat="";
var expandedParent=null;
function buildFilters(){
  var f=document.getElementById("filters");
  var h='<span class="chip on" onclick="filter(\\'\\')">全部</span>';
  DATA.categories.forEach(function(cat){
    h+='<span class="chip parent" onclick="toggleParent(\\''+cat.name+'\\')">'+cat.name+' <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg></span>';
    h+='<span class="sub-group" id="sub-'+cat.name.replace(/ /g,'_')+'" style="display:none">';
    if(cat.subs) cat.subs.forEach(function(sub){
      h+='<span class="chip sub" onclick="event.stopPropagation();filter(\\''+sub+'\\')">'+sub+'</span>';
    });
    h+='</span>';
  });
  f.innerHTML=h;
}
function toggleParent(name){
  if(expandedParent===name){expandedParent=null}else{expandedParent=name}
  document.querySelectorAll(".sub-group").forEach(function(g){g.style.display="none"});
  document.querySelectorAll(".parent").forEach(function(c){c.classList.remove("on")});
  if(expandedParent){
    var sg=document.getElementById("sub-"+expandedParent.replace(/ /g,"_"));
    if(sg) sg.style.display="inline-flex";
    document.querySelectorAll(".parent").forEach(function(c){if(c.textContent.startsWith(expandedParent))c.classList.add("on")});
  }
  filter(expandedParent||"");
}
function filter(cat){
  activeCat=cat;
  document.querySelectorAll(".chip.sub").forEach(function(el){el.classList.toggle("on",el.textContent===cat)});
  document.querySelectorAll(".chip.parent").forEach(function(el){el.classList.remove("on")});
  expandedParent=null;
  document.querySelectorAll(".sub-group").forEach(function(g){g.style.display="none"});
  render();
}
function search(){render();}
function render(){
  var q=(document.getElementById("searchInput").value||"").toLowerCase();
  var items=DATA.products;
  if(activeCat) items=items.filter(function(p){return p.c.includes(activeCat)});
  if(q) items=items.filter(function(p){return p.n.toLowerCase().includes(q)});
  var grid=document.getElementById("grid");
  if(items.length===0){grid.innerHTML='<div class="empty"><div class="icon">📭</div><div>没有找到产品</div></div>';return}
  grid.innerHTML=items.map(function(p,i){
    var meta=[p.w?p.w+"g":"",p.rs?"圈"+p.rs:"",p.cl?p.cl:""].filter(Boolean).join(" · ");
    return '<div class="card" onclick="openDetail('+DATA.products.indexOf(p)+')">'
    +(p.img?'<img src="'+p.img+'" loading="lazy">':'<div class="noimg"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#B0BEC5" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>')
    +'<div class="info"><div class="name">'+p.n+'</div>'
    +(meta?'<div class="meta">'+meta+'</div>':'')
    +(p.lc?'<div class="price">¥'+(p.lc).toFixed(0)+(p.lu==="per_gram"?"/克":"/件")+'</div>':'')
    +'</div></div>';
  }).join("");
}
function openDetail(i){
  var p=DATA.products[i]; if(!p) return;
  document.getElementById("detailImg").src=p.img||"";
  document.getElementById("detailImg").classList.remove("zoomed");
  document.getElementById("detailName").textContent=p.n;
  document.getElementById("detailTags").innerHTML=p.c.map(function(c){return '<span class="tag">'+c+'</span>'}).join("");
  var specs=[];
  if(p.rs) specs.push('<span class="spec">圈口：'+p.rs+'</span>');
  if(p.cl) specs.push('<span class="spec">链长：'+p.cl+'</span>');
  if(p.w) specs.push('<span class="spec">克重：'+p.w+'g</span>');
  document.getElementById("detailSpecs").innerHTML=specs.join("");
  document.getElementById("detailCost").textContent=p.lc?"¥"+(p.lc).toFixed(0)+(p.lu==="per_gram"?"/克":"/件"):"";
  document.getElementById("detail").classList.add("show");
}
function closeDetail(){document.getElementById("detail").classList.remove("show");}
document.getElementById("detailImg").addEventListener("click",function(){this.classList.toggle("zoomed")});
buildFilters();render();
</script></body></html>
